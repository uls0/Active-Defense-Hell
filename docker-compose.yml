version: '3.8'
services:
  hell_core:
    build: .
    container_name: hell_core
    restart: always
    network_mode: host
    privileged: true
    volumes:
      - ./logs:/app/logs
      - ./scripts:/app/scripts
      - ./payloads:/app/payloads
      - ./templates:/app/templates
    environment:
      - MY_IP=${MY_IP}

  hell_dashboard:
    build: .
    container_name: hell_dashboard
    restart: always
    network_mode: host
    command: python3 -u scripts/dashboard_server.py
    volumes:
      - ./logs:/app/logs
      - ./scripts:/app/scripts
      - ./templates:/app/templates
