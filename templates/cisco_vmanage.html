<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cisco SD-WAN Manager</title>
    <style>
        body { background-color: #002c47; color: white; font-family: 'CiscoSans', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; color: #333; padding: 40px; border-radius: 4px; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { color: #005073; margin-bottom: 20px; font-weight: 300; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 2px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #00bceb; border: none; color: white; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .footer-logo { text-align: center; margin-top: 20px; color: #999; font-size: 12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://www.cisco.com/c/dam/en/us/td/i/templates/blank.gif" alt="Cisco Logo" style="width: 80px; margin-bottom: 10px;">
        <h2>vManage Login</h2>
        <form action="/j_security_check" method="POST">
            <input type="text" name="j_username" placeholder="Username" required>
            <input type="password" name="j_password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        <div class="footer-logo">Cisco Systems, Inc. &copy; 2026</div>
    </div>
</body>
</html>
